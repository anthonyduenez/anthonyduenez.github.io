<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4: Sign up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1> Sign Up Form </h1>

    <fieldset>
    <legend>Sign Up</legend>
    First Name: <input type="text"><br> 
    Last Name: <input type="text"><br> 
    Email: <input type="text"><br> 
    Phone Number:<input type="text"><br><br>
    Zip Code: <input id= "zipcode" type="text"><p id="zipcodeError" style="color: red; display: none;">Zip code not found</p><br>
    City: <span id="cityText"></span>
    <br>
    Latitude: <span id="latitudeText"></span>
    <br>
    Longitude: <span id="longitudeText"></span>
    <br><br>
    State:  <select id="state"></select><br>
    Select a County: <select id="county"></select><br>

    <br><span id="availableText"></span> <br>
    Desired Username: <input id="user" type="text"><br>
    Password: <input id="password" type="password">
    <span id="text"></span><br>
    Type Password Again: <input id="passwordAgain" type="password"><br>
    <input id="submitBtn" type="submit" value="Sign up!">
    <br><span id="signupError"></span>
    </fieldset>

    <script src="js/script.js"></script>
</body>
</html>
