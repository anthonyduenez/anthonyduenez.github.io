<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Machine</title>
    <link rel="stylesheet" href="styles.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    <h1>SLOT MACHINE</h1>
    <hr>
    <p>PLACE YOUR BET AND SPIN TO WIN!</p>
    <hr class="dashed">
    <figure> 
        <img id="slot1" src="https://img.icons8.com/?size=100&id=19527&format=png&color=000000" width="100">
        <img id="slot2" src="https://img.icons8.com/?size=100&id=ARv3phtnx9Bx&format=png&color=000000" width="100">
        <img id="slot3" src="https://img.icons8.com/?size=100&id=63230&format=png&color=000000" width="100">
    </figure>
    <hr class="dashed">
    <p id="result"></p>
    <p id="payout">PAYOUT: </p>
    <label for="bet">Bet Amount:</label>
    <input type="number" id="betAmount" name="bet" min="5" step="5"><br>
    <button id="spinBtn" type="submit">Spin</button>
</body>
</html>
